apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aether-oncology-hpa
  namespace: clinical-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aether-oncology-inference
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aether-oncology-ingress
  namespace: clinical-production
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:xxxx:certificate/xxxx
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS-1-2-2017-01
spec:
  rules:
  - host: portal.aether-oncology.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aether-oncology-service
            port:
              number: 80
