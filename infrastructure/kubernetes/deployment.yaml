apiVersion: apps/v1
kind: Deployment
metadata:
  name: aether-oncology-inference
  namespace: clinical-production
  labels:
    app: aether-oncology
    tier: inference
    tier-version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aether-oncology
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: aether-oncology
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: inference-api
        image: aether-oncology:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "1"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: aether-secrets
              key: api-key
        - name: LOG_LEVEL
          value: "INFO"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          # Gate traffic on the PRIMARY Oral Cancer model being loaded.
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: aether-oncology-service
  namespace: clinical-production
spec:
  selector:
    app: aether-oncology
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aether-oncology-hpa
  namespace: clinical-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aether-oncology-inference
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aether-oncology-pdb
  namespace: clinical-production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: aether-oncology
