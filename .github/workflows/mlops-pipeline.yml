name: Aether Oncology MLOps Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  mlops-flow:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ETAPA 1: Rodar Testes Unitários (Qualidade do Código)
      - name: Run Unit Tests
        run: pytest tests/

      # ETAPA 2: Treinar o modelo (Executa se os testes passarem)
      - name: Train and Evaluate Model
        env:
          # Variáveis para o MLflow (Configure nos Secrets do GitHub)
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          # O script de treino deve retornar erro (exit 1) se a acurácia for baixa
          python src/train.py --register-mlflow true
