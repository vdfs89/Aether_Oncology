name: Enterprise CD Pipeline (Canary)

on:
  push:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Build Docker image + Security scan + Policy gate
  # ─────────────────────────────────────────────────────────────────────────
  build-and-scan:
    runs-on: ubuntu-latest
    # Required for CodeQL SARIF upload to GitHub Security tab
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t aether-oncology:${{ github.sha }} .

      # ── Step 1: Generate SARIF report (never fails the build) ──────────────
      # anchore/scan-action generates the SARIF artefact used by CodeQL upload.
      # fail-build: false ensures SARIF is always written — even when grype
      # finds issues — so the Security tab always has up-to-date findings.
      - name: Security Scan — SARIF Report
        id: scan
        uses: anchore/scan-action@v3
        with:
          image: "aether-oncology:${{ github.sha }}"
          fail-build: false
          severity-cutoff: critical
          # SARIF is written to results.sarif by default (scan-action v3 default)

      # ── Step 2: Upload SARIF to GitHub Security tab ────────────────────────
      - name: Upload SARIF vulnerability report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: results.sarif

      # ── Step 3: Policy gate — grype reads .grype.yaml from repo root ───────
      # Running grype directly gives us full control: ignore rules, only-fixed,
      # and fail-on-severity all come from .grype.yaml, not the scan-action.
      # This is the authoritative pass/fail gate for the pipeline.
      - name: Security Policy Gate (grype)
        env:
          GRYPE_DB_MAX_ALLOWED_BUILT_AGE: "12000h"
          GRYPE_DB_VALIDATE_AGE: "false"
        run: |
          # Install grype
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

          # Run grype against the built image using our policy (.grype.yaml).
          # Exit code 0 = clean or all findings are ignored; non-zero = block.
          grype aether-oncology:${{ github.sha }} \
            --config .grype.yaml \
            --output table

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Canary deploy (10 % traffic weight)
  #
  # Guard pattern: the KUBECONFIG secret is injected as an env var.
  # If it is empty (secret not configured), every K8s/helm step emits a
  # warning and exits 0 — the pipeline stays green while no cluster exists.
  # ─────────────────────────────────────────────────────────────────────────
  deploy-canary:
    needs: build-and-scan
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://portal.aether-oncology.ai
    env:
      # Expose secret as env var so shell guards work without leaking the
      # raw value into YAML expressions (GitHub security best-practice).
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
    steps:
      - uses: actions/checkout@v3

      # ── Kubeconfig setup ──────────────────────────────────────────────────
      # Writes the base64-decoded (or raw PEM) kubeconfig and exports the
      # KUBECONFIG env var for all subsequent steps in this job.
      - name: Set up Kubeconfig
        run: |
          if [ -z "${KUBECONFIG_B64}" ]; then
            echo "::warning::KUBECONFIG secret is not set — all K8s steps will be skipped."
            echo "KUBECONFIG_AVAILABLE=false" >> "$GITHUB_ENV"
          else
            mkdir -p ~/.kube
            echo "${KUBECONFIG_B64}" | base64 -d > ~/.kube/config 2>/dev/null \
              || echo "${KUBECONFIG_B64}" > ~/.kube/config
            chmod 600 ~/.kube/config
            echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"
            echo "KUBECONFIG_AVAILABLE=true"     >> "$GITHUB_ENV"
            echo "::notice::Kubeconfig written to ~/.kube/config"
          fi

      # ── Cluster reachability check ────────────────────────────────────────
      - name: Verify cluster reachability
        if: env.KUBECONFIG_AVAILABLE == 'true'
        run: |
          if ! kubectl cluster-info --request-timeout=10s; then
            echo "::error::Kubernetes cluster is unreachable. Check KUBECONFIG secret."
            exit 1
          fi

      # ── Helm canary deploy ────────────────────────────────────────────────
      - name: Deploy Canary (10%)
        if: env.KUBECONFIG_AVAILABLE == 'true'
        run: |
          helm upgrade --install aether-oncology ./charts/aether-oncology \
            --namespace default \
            --create-namespace \
            --atomic \
            --timeout 5m \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=true \
            --set canary.weight=10

      # ── Post-deploy health check ──────────────────────────────────────────
      - name: Post-Deploy Health Check
        if: env.KUBECONFIG_AVAILABLE == 'true'
        run: |
          echo "Waiting for canary deployment to stabilize..."
          MAX_RETRIES=12
          COUNT=0
          until [ "$(curl -sf https://portal.aether-oncology.ai/health | jq -r '.status' 2>/dev/null)" = "healthy" ]; do
            if [ "$COUNT" -ge "$MAX_RETRIES" ]; then
              echo "::error::Canary health check timed out after 2 minutes. Rolling back..."
              helm rollback aether-oncology --namespace default
              exit 1
            fi
            echo "Health check attempt $((COUNT+1))/$MAX_RETRIES: still waiting..."
            sleep 10
            COUNT=$((COUNT+1))
          done
          echo "::notice::Canary health check passed!"

      # ── Skip notice when no cluster ───────────────────────────────────────
      - name: Skipped — no cluster configured
        if: env.KUBECONFIG_AVAILABLE != 'true'
        run: |
          echo "::warning::deploy-canary skipped: KUBECONFIG secret is not configured."
          echo "Configure the KUBECONFIG repository secret to enable live deployments."

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: Promote canary → 100 % production
  # ─────────────────────────────────────────────────────────────────────────
  promote-production:
    needs: deploy-canary
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://portal.aether-oncology.ai
    env:
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
    steps:
      - uses: actions/checkout@v3

      # Same kubeconfig guard as deploy-canary
      - name: Set up Kubeconfig
        run: |
          if [ -z "${KUBECONFIG_B64}" ]; then
            echo "KUBECONFIG_AVAILABLE=false" >> "$GITHUB_ENV"
          else
            mkdir -p ~/.kube
            echo "${KUBECONFIG_B64}" | base64 -d > ~/.kube/config 2>/dev/null \
              || echo "${KUBECONFIG_B64}" > ~/.kube/config
            chmod 600 ~/.kube/config
            echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"
            echo "KUBECONFIG_AVAILABLE=true"     >> "$GITHUB_ENV"
          fi

      - name: Promote to 100%
        if: env.KUBECONFIG_AVAILABLE == 'true'
        run: |
          helm upgrade --install aether-oncology ./charts/aether-oncology \
            --namespace default \
            --atomic \
            --timeout 5m \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=false

      - name: Skipped — no cluster configured
        if: env.KUBECONFIG_AVAILABLE != 'true'
        run: |
          echo "::warning::promote-production skipped: KUBECONFIG secret is not configured."
