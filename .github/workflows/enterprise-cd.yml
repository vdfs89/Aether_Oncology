name: Enterprise CD Pipeline (Canary)

on:
  push:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    # Required for CodeQL SARIF upload to GitHub Security tab
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Docker Image
        run: docker build -t aether-oncology:${{ github.sha }} .
        
      # Grype automatically discovers .grype.yaml from the repo root.
      # .grype.yaml sets only-fixed: true (ignore unfixable CVEs) and
      # fail-on-severity: critical — aligned with severity-cutoff below.
      - name: Security Scan (SBOM)
        id: scan
        uses: anchore/scan-action@v3
        with:
          image: "aether-oncology:${{ github.sha }}"
          fail-build: true
          # Fail only on CRITICAL (≥9.0 CVSS v3). HIGH CVEs without an
          # available fix are suppressed by .grype.yaml (only-fixed: true).
          severity-cutoff: critical

      - name: Upload SARIF vulnerability report
        uses: github/codeql-action/upload-sarif@v3
        # Run even when scan fails so report is visible in Security tab.
        # continue-on-error: true prevents a broken/empty SARIF (generated
        # when grype exits non-zero) from cascading and blocking the job.
        if: always()
        continue-on-error: true
        with:
          sarif_file: results.sarif

  deploy-canary:
    needs: build-and-scan
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://portal.aether-oncology.ai
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig
          export KUBECONFIG=kubeconfig
          
      - name: Deploy Canary (10%)
        run: |
          helm upgrade --install aether-oncology ./charts/aether-oncology \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=true \
            --set canary.weight=10
            
      - name: Post-Deploy Health Check
        run: |
          echo "Waiting for canary deployment to stabilize..."
          MAX_RETRIES=12
          COUNT=0
          until [ $(curl -s https://portal.aether-oncology.ai/health | jq -r .status) == "healthy" ]; do
            if [ $COUNT -eq $MAX_RETRIES ]; then
              echo "Canary health check timed out after 2 minutes. Rolling back..."
              helm rollback aether-oncology
              exit 1
            fi
            echo "Health check attempt $COUNT/12: Still waiting..."
            sleep 10
            COUNT=$((COUNT+1))
          done
          echo "Canary health check passed!"

  promote-production:
    needs: deploy-canary
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://portal.aether-oncology.ai
    steps:
      - name: Promote to 100%
        run: |
          helm upgrade --install aether-oncology ./charts/aether-oncology \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=false
