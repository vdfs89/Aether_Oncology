name: Enterprise CD Pipeline (Canary)

on:
  push:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    # Required for CodeQL SARIF upload to GitHub Security tab
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t aether-oncology:${{ github.sha }} .

      # ── Step 1: Generate SARIF report (never fails the build) ──────────────
      # anchore/scan-action generates the SARIF artefact used by CodeQL upload.
      # fail-build: false ensures SARIF is always written — even when grype
      # finds issues — so the Security tab always has up-to-date findings.
      - name: Security Scan — SARIF Report
        id: scan
        uses: anchore/scan-action@v3
        with:
          image: "aether-oncology:${{ github.sha }}"
          fail-build: false
          severity-cutoff: critical
          # SARIF is written to results.sarif by default (scan-action v3 default)

      # ── Step 2: Upload SARIF to GitHub Security tab ────────────────────────
      - name: Upload SARIF vulnerability report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: results.sarif

      # ── Step 3: Policy gate — grype reads .grype.yaml from repo root ───────
      # Running grype directly gives us full control: ignore rules, only-fixed,
      # and fail-on-severity all come from .grype.yaml, not the scan-action.
      # This is the authoritative pass/fail gate for the pipeline.
      - name: Security Policy Gate (grype)
        env:
          GRYPE_DB_MAX_ALLOWED_BUILT_AGE: "12000h"
          GRYPE_DB_VALIDATE_AGE: "false"
        run: |
          # Install grype
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

          # Run grype against the built image using our policy (.grype.yaml).
          # Exit code 0 = clean or all findings are ignored; non-zero = block.
          grype aether-oncology:${{ github.sha }} \
            --config .grype.yaml \
            --output table

  deploy-canary:
    needs: build-and-scan
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://portal.aether-oncology.ai
    steps:
      - uses: actions/checkout@v3

      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

      - name: Deploy Canary (10%)
        run: |
          helm upgrade --install aether-oncology ./charts/aether-oncology \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=true \
            --set canary.weight=10

      - name: Post-Deploy Health Check
        run: |
          echo "Waiting for canary deployment to stabilize..."
          MAX_RETRIES=12
          COUNT=0
          until [ $(curl -s https://portal.aether-oncology.ai/health | jq -r .status) == "healthy" ]; do
            if [ $COUNT -eq $MAX_RETRIES ]; then
              echo "Canary health check timed out after 2 minutes. Rolling back..."
              helm rollback aether-oncology
              exit 1
            fi
            echo "Health check attempt $COUNT/12: Still waiting..."
            sleep 10
            COUNT=$((COUNT+1))
          done
          echo "Canary health check passed!"

  promote-production:
    needs: deploy-canary
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://portal.aether-oncology.ai
    steps:
      - name: Promote to 100%
        run: |
          helm upgrade --install aether-oncology ./charts/aether-oncology \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=false
