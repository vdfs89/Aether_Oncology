name: Continuous Retraining (CT) Pipeline

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  repository_dispatch:
    types: [drift_detected]
  workflow_dispatch:

jobs:
  check-drift-and-retrain:
    name: Drift Check & Retrain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Detect Drift (KS-Test)
        id: drift_check
        # Non-blocking: "no drift" is a valid outcome and must not fail the pipeline.
        run: |
          python - <<'PY'
          import sys
          import pandas as pd
          from src.ml_platform.drift import DriftDetector

          baseline = pd.read_csv("data/raw/oral_cancer_top30.csv")
          # On a scheduled run with no fresh production sample, compare the
          # dataset against itself — this exercises the detector and yields "no drift".
          current = baseline.sample(frac=0.3, random_state=42)

          detector = DriftDetector(baseline)
          report = detector.check_data_drift(current)
          drift = bool(report.get("drift_detected", False))
          print(f"drift_detected={drift}")
          with open(__import__("os").environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"drift={'true' if drift else 'false'}\n")
          PY

      - name: Retrain Model
        # Retrain when drift is detected OR when triggered manually / by dispatch.
        if: steps.drift_check.outputs.drift == 'true' || github.event_name != 'schedule'
        env:
          # Fall back to a local file store when no remote tracking secret is set.
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI || './mlruns' }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python -m src.train

      - name: Upload Retrained Model Artifacts
        if: steps.drift_check.outputs.drift == 'true' || github.event_name != 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: retrained-model
          path: models/
