name: CI — Aether Oncology

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (prod + dev)
        run: pip install ".[dev]"

      - name: Lint (Ruff)
        run: ruff check src/ tests/

      - name: Format check (Ruff)
        run: ruff format src/ tests/ --check

      - name: Generate dataset
        run: python scratch/regenerate_data.py

      - name: Train model
        run: python -m src.train

      - name: Run tests with coverage
        run: pytest tests/ --cov=src --cov-report=term-missing -q
      
      - name: Upload Trained Model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/  # Ou a pasta onde seu src.train salva os arquivos
