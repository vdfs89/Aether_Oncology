name: CI — Aether Oncology

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (prod + dev)
        run: pip install ".[dev]"

      - name: Lint (Ruff)
        run: ruff check src/ tests/

      - name: Format check (Ruff)
        run: ruff format src/ tests/ --check

      - name: Generate dataset
        run: |
          python - <<'EOF'
          from sklearn.datasets import load_breast_cancer
          import pandas as pd, pathlib, re
          pathlib.Path("data/raw").mkdir(parents=True, exist_ok=True)
          data = load_breast_cancer()
          # Converte "mean radius" → "radius_mean", "radius error" → "radius_se", "worst radius" → "radius_worst"
          def normalize(name: str) -> str:
              name = name.strip()
              if name.startswith("mean "):
                  return name[5:].replace(" ", "_") + "_mean"
              if name.endswith(" error"):
                  return name[:-6].replace(" ", "_") + "_se"
              if name.startswith("worst "):
                  return name[6:].replace(" ", "_") + "_worst"
              return name.replace(" ", "_")
          cols = [normalize(c) for c in data.feature_names]
          df = pd.DataFrame(data.data, columns=cols)
          df["target"] = 1 - data.target  # 1=Maligno, 0=Benigno
          df.to_csv("data/raw/data.csv", index=False)
          print(f"Dataset: {df.shape} | colunas[:3]: {list(df.columns[:3])}")
          EOF

      - name: Train model
        run: python -m src.train

      - name: Run tests with coverage
        run: pytest tests/ --cov=src --cov-report=term-missing -q
      
      - name: Upload Trained Model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/  # Ou a pasta onde seu src.train salva os arquivos
