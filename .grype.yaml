# .grype.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Grype vulnerability scanner configuration
# Docs: https://github.com/anchore/grype#configuration
# ─────────────────────────────────────────────────────────────────────────────

# Only report vulnerabilities that have a known fix available.
# This eliminates noise from unfixable OS-level CVEs in base images.
only-fixed: true

# Fail the build only on CRITICAL severity (CVSS ≥ 9.0).
# HIGH vulnerabilities without a fix are excluded by `only-fixed: true`.
fail-on-severity: "critical"

# ─── Ignore list ──────────────────────────────────────────────────────────────
# Each entry represents a risk-accepted decision.
# NOTE: `fix-state` constraints are intentionally OMITTED so rules apply
# regardless of whether a patch exists — grype's `only-fixed: true` already
# filters down to fixable CVEs; any remaining ones in this list are accepted
# for the architectural reasons stated below.
#
# Review cadence: quarterly or on each major base-image bump.
ignore:
  # ── libgomp / OpenMP bundled inside PyTorch wheels ────────────────────────
  - vulnerability: CVE-2023-4039
    reason: >
      Bundled libgomp in torch binary wheel. Container is non-root,
      no shell, egress-restricted. Stack-smashing requires local code
      execution which is outside our threat model.

  # ── OpenSSL 3.x (Debian Bookworm) ────────────────────────────────────────
  - vulnerability: CVE-2024-0727
    reason: >
      PKCS#12 null-pointer dereference requires crafted input to openssl CLI.
      We never invoke the openssl binary directly; only libssl via Python ssl.

  - vulnerability: CVE-2024-2511
    reason: >
      TLS session cache memory leak (DoS). Mitigated by load-balancer
      TLS termination — container does not expose TLS directly.

  - vulnerability: CVE-2024-5535
    reason: >
      SSL_select_next_proto buffer over-read. Only reachable via NPN
      extension which is disabled in our uvicorn/httpx TLS config.

  # ── libexpat ─────────────────────────────────────────────────────────────
  - vulnerability: CVE-2024-28757
    reason: >
      DTD recursive-expansion DoS in libexpat. API never parses untrusted
      XML; the affected code path is unreachable from our endpoints.

  # ── zlib / minizip ────────────────────────────────────────────────────────
  - vulnerability: CVE-2023-45853
    reason: >
      MiniZip integer overflow. Debian security tracker confirms the
      affected minizip code is not compiled into Debian's zlib package.

  # ── setuptools ────────────────────────────────────────────────────────────
  # CVE-2024-6345: path traversal via VCS URLs in editable installs.
  # The final image does NOT perform editable installs at runtime.
  # setuptools is upgraded to >=70.0 in the Dockerfile RUN layer.
  - vulnerability: CVE-2024-6345
    reason: >
      Path traversal in editable installs (setup.py). Not exploitable:
      the runtime container never executes pip install or setup.py.
      setuptools is upgraded to >=70.0 during image build.

  # ── pip ───────────────────────────────────────────────────────────────────
  - vulnerability: CVE-2023-5752
    reason: >
      Mercurial VCS URL injection in pip. No Mercurial usage or pip install
      at runtime. pip is upgraded to latest stable during image build.

  # ── stdlib tarfile ────────────────────────────────────────────────────────
  - vulnerability: CVE-2007-4559
    reason: >
      Python tarfile path traversal (ancient CVE, no upstream patch in cpython
      stdlib). Our application never extracts tar archives from untrusted input.

  # ── glibc GLIBC_2.x ──────────────────────────────────────────────────────
  - vulnerability: CVE-2024-2961
    reason: >
      iconv out-of-bounds write in ISO-2022-CN-EXT codec. Requires attacker
      control of iconv charset parameter which is never user-supplied in our
      application stack.

  - vulnerability: CVE-2024-33599
    reason: >
      nscd: stack-based buffer overflow. nscd is not installed or running
      in the container; only glibc shared library is present.

  - vulnerability: CVE-2024-33600
    reason: >
      nscd: null pointer dereference. nscd not present — see above.

  - vulnerability: CVE-2024-33601
    reason: >
      nscd: crashes on out-of-memory. nscd not present — see above.

  - vulnerability: CVE-2024-33602
    reason: >
      nscd: memory corruption. nscd not present — see above.
