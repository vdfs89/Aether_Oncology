# .grype.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Grype vulnerability scanner configuration
# Docs: https://github.com/anchore/grype#configuration
# ─────────────────────────────────────────────────────────────────────────────

# Only report vulnerabilities that have a known fix available.
# This eliminates noise from unfixable OS-level CVEs in base images.
only-fixed: true

# Fail the build only on CRITICAL severity (CVSS ≥ 9.0).
# HIGH vulnerabilities without a fix are excluded by `only-fixed: true`.
fail-on-severity: "critical"

# ─── Ignore list ──────────────────────────────────────────────────────────────
# Each entry represents a risk-accepted decision.
# NOTE: fix-state constraints are OMITTED — rules apply regardless of patch
# state. The global `only-fixed: true` already scopes to patchable CVEs;
# items here are architecturally accepted risks.
# Review cadence: quarterly or on each major base-image bump.
ignore:
  # ── libexpat ─────────────────────────────────────────────────────────────
  - vulnerability: CVE-2024-28757
    reason: >
      DTD recursive-expansion DoS in libexpat. API never parses untrusted
      XML. Patched in Debian Bookworm via apt-get upgrade in the Dockerfile.

  - vulnerability: CVE-2024-45490
    reason: >
      libexpat < 2.6.3 XML_ResumeParser OOB read. Fixed in 2.6.3-2+deb12u1;
      Dockerfile apt-get upgrade applies this patch at build time.

  - vulnerability: CVE-2024-45491
    reason: >
      libexpat < 2.6.3 dtdCopy integer overflow (CRITICAL). Fixed in
      2.6.3-2+deb12u1; Dockerfile apt-get upgrade applies this patch.
      Accepted: API never parses external/untrusted XML documents.

  - vulnerability: CVE-2024-45492
    reason: >
      libexpat < 2.6.3 nextScaffoldPart integer overflow (CRITICAL). Fixed in
      2.6.3-2+deb12u1; Dockerfile apt-get upgrade applies this patch.
      Accepted: same reasoning as CVE-2024-45491.

  - vulnerability: CVE-2024-50602
    reason: >
      libexpat XML_ParseBuffer use-after-free. Fixed in 2.6.4+.
      Dockerfile apt-get upgrade pulls latest Bookworm security updates.

  # ── OpenSSL 3.x (Debian Bookworm) ────────────────────────────────────────
  - vulnerability: CVE-2024-0727
    reason: >
      PKCS#12 null-pointer dereference — openssl CLI only.
      We never invoke the openssl binary; only libssl via Python ssl module.

  - vulnerability: CVE-2024-2511
    reason: >
      TLS session cache memory leak (DoS). Mitigated by load-balancer
      TLS termination — container does not expose TLS directly.

  - vulnerability: CVE-2024-4603
    reason: >
      Excessive time checking DSA keys. Not exploitable without attacker
      supplying a crafted DSA key to our API (we use TLS certs only).

  - vulnerability: CVE-2024-5535
    reason: >
      SSL_select_next_proto buffer over-read. Only reachable via NPN
      extension which is disabled in our uvicorn/httpx TLS config.

  - vulnerability: CVE-2024-6119
    reason: >
      X.509 hostname check use-after-free. Not exploitable without attacker
      controlling TLS certificate parsing; mitigated by strict cert pinning.

  - vulnerability: CVE-2024-9143
    reason: >
      Out-of-bound memory access in low-level GF(2^m) elliptic curve
      functions. Not reachable through our API's TLS / crypto surface.

  # ── Python / CPython ─────────────────────────────────────────────────────
  - vulnerability: CVE-2024-6232
    reason: >
      tarfile ReDoS. Fixed in Python 3.12.6. Dockerfile base image is
      python:3.12-slim-bookworm which receives CPython security updates.
      App never extracts archives from user-supplied input.

  - vulnerability: CVE-2024-7592
    reason: >
      http.cookies ReDoS. Fixed in Python 3.12.5+. Not exploitable without
      attacker sending crafted Cookie headers to our API (rate-limited, API-
      key protected endpoints only).

  - vulnerability: CVE-2025-0938
    reason: >
      Python urllib SSRF. Fixed in Python 3.12.9+. Our application never
      makes outbound HTTP requests from user-controlled URLs.

  # ── setuptools ────────────────────────────────────────────────────────────
  - vulnerability: CVE-2024-6345
    reason: >
      Path traversal in editable installs. Runtime container never executes
      pip install or setup.py. Dockerfile upgrades setuptools to >=70.0.

  # ── pip ───────────────────────────────────────────────────────────────────
  - vulnerability: CVE-2023-5752
    reason: >
      Mercurial VCS URL injection in pip. No Mercurial usage at runtime.
      pip upgraded to latest stable during image build.

  # ── stdlib tarfile ────────────────────────────────────────────────────────
  - vulnerability: CVE-2007-4559
    reason: >
      Python tarfile path traversal (ancient CVE, no upstream patch).
      Application never extracts tar archives from untrusted input.

  # ── zlib / minizip ────────────────────────────────────────────────────────
  - vulnerability: CVE-2023-45853
    reason: >
      MiniZip integer overflow. Debian security tracker confirms the
      affected minizip code is not compiled into Debian's zlib package.

  # ── libgomp / OpenMP bundled inside PyTorch wheels ────────────────────────
  - vulnerability: CVE-2023-4039
    reason: >
      Bundled libgomp in torch wheel. Container is non-root, no shell,
      egress-restricted. Stack-smashing requires local code execution.

  # ── glibc / nscd ─────────────────────────────────────────────────────────
  - vulnerability: CVE-2024-2961
    reason: >
      iconv ISO-2022-CN-EXT OOB write. Requires attacker-controlled
      iconv charset — never user-supplied in our stack.

  - vulnerability: CVE-2024-33599
    reason: nscd stack overflow — nscd is not installed in the container.

  - vulnerability: CVE-2024-33600
    reason: nscd null pointer — nscd not present.

  - vulnerability: CVE-2024-33601
    reason: nscd OOM crash — nscd not present.

  - vulnerability: CVE-2024-33602
    reason: nscd memory corruption — nscd not present.

  # ── curl / libcurl ────────────────────────────────────────────────────────
  - vulnerability: CVE-2024-2398
    reason: >
      curl HTTP/2 PUSH_PROMISE memory leak. We use httpx (not libcurl) for
      outbound requests; curl binary is not present in the final image.

  - vulnerability: CVE-2024-11053
    reason: >
      curl credential leak via redirect. curl binary not present in image.

  # ── Miscellaneous ─────────────────────────────────────────────────────────
  - vulnerability: CVE-2024-52337
    reason: >
      Debian packaging tool CVE. Not present in runtime image layer.

  - vulnerability: CVE-2024-56171
    reason: >
      libxml2 use-after-free. libxml2 is not directly imported by our
      Python application; only present as transitive dependency of lxml
      (if installed). Patched via apt-get upgrade.

  - vulnerability: CVE-2025-24928
    reason: >
      libxml2 stack overflow. Same reasoning as CVE-2024-56171.

  - vulnerability: CVE-2025-27363
    reason: >
      FreeType out-of-bounds write. FreeType not used by our application
      (no image rendering). Patched via apt-get upgrade at build time.
